# deploy/nginx-location.conf
# -----------------------------------------------------------------------------
# Bloque `location` a agregar DENTRO del server block existente del VPS
# (archivo /etc/nginx/sites-enabled/gam-multi) para servir field-coord-v2 bajo
# la ruta /CI1215V2.
#
# Alineado con el patrón de location /aristoteles que ya funciona en el VPS.
# -----------------------------------------------------------------------------

    # ── Field Coord (CI1215V2) ──
    location ^~ /CI1215V2 {
        alias /var/www/field-coord-v2/dist;
        index index.html;
        try_files $uri $uri/ /CI1215V2/index.html;
        add_header Cache-Control "no-cache, must-revalidate";
        # BEGIN ci1215v2-security-headers
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(self), microphone=(), geolocation=(self)" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://*.basemaps.cartocdn.com https://*.tile.openstreetmap.org https://*.supabase.co; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://*.basemaps.cartocdn.com https://*.tile.openstreetmap.org; frame-ancestors 'self'" always;
        # END ci1215v2-security-headers

        # Cache agresivo para assets con hash de Vite (nombres cambian en cada build)
        location ~* ^/CI1215V2/assets/.*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
